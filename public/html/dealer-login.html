<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAMS - Dealer Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <h1>WAMS Dealer Portal</h1>
      <p>Web Based Automated Manufacturing System</p>
      <div class="login-error" id="loginError"></div>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="Enter your email" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="Enter your password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">Sign In</button>
      </form>
      <div class="mt-4">
        <p class="text-muted text-center mb-2">Demo Credentials</p>
        <div class="flex flex-center gap-4" style="justify-content: center;">
          <button type="button" class="btn btn-sm btn-outline" onclick="fillLogin('ravi@abcelectronics.com','dealer123')">ABC Electronics</button>
          <button type="button" class="btn btn-sm btn-outline" onclick="fillLogin('priya@xyztrading.com','dealer123')">XYZ Trading</button>
        </div>
      </div>
      <div class="mt-4 text-center">
        <a href="/login.html" class="btn btn-sm btn-outline">Staff Login</a>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    function fillLogin(email, pass) {
      document.querySelector('input[name="email"]').value = email;
      document.querySelector('input[name="password"]').value = pass;
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const email = formData.get('email');
      const password = formData.get('password');
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span> Signing in...';
      errorEl.style.display = 'none';
      
      try {
        const response = await fetch('/api/auth/dealer-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
        
        const result = await response.json();
        
        if (!response.ok) {
          throw new Error(result.error || 'Login failed');
        }
        
        if (result.success) {
          window.location.href = '/dealer-dashboard.html';
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    });
  </script>
</body>
</html>
