<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAMS - Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <h1>WAMS</h1>
      <p>Web Based Automated Manufacturing System</p>
      <div class="login-error" id="loginError"></div>
      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" required placeholder="Enter your username" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="Enter your password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">Sign In</button>
      </form>
      <div class="mt-4 text-center">
        <a href="/dealer-login.html" class="btn btn-sm btn-outline">Dealer Login</a>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    function fillLogin(user, pass) {
      document.querySelector('input[name="username"]').value = user;
      document.querySelector('input[name="password"]').value = pass;
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const username = formData.get('username');
      const password = formData.get('password');
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span> Signing in...';
      errorEl.style.display = 'none';
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password })
        });
        
        const result = await response.json();
        
        if (!response.ok) {
          throw new Error(result.error || 'Login failed');
        }
        
        if (result.success) {
          window.location.href = '/index.html';
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    });
  </script>
</body>
</html>
